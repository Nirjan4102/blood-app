<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission: Save a Life | LIFESAVE</title>
    <meta name="description" content="Navigate to the patient who needs your blood donation. LIFESAVE mission navigation page.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('blood.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
        }
    
        /* ── Particles BG ── */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #050505 0%, #064e3b 100%);
            z-index: 0;
            top: 0; left: 0;
        }

        /* ── Refined Glassmorphism ── */
        .glass-card {
            background: rgba(30, 41, 59, 0.7) !important; /* Lighter slate-blue/green glass */
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            border-top: 1px solid rgba(255, 255, 255, 0.3) !important;
            border-left: 1px solid rgba(255, 255, 255, 0.3) !important;
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.5), 
                0 0 40px rgba(16, 185, 129, 0.1) !important;
            animation: none !important;
        }

        .float-wrapper {
            animation: none !important;
        }

        /* ── Input Polish ── */
        .glass-input {
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.1) !important; /* Brighter input background */
            border: 1px solid rgba(255, 255, 255, 0.3) !important; /* Brighter border */
            color: #ffffff !important;
        }
        .glass-input::placeholder { color: rgba(255, 255, 255, 0.6) !important; }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.15) !important;
            border-color: rgba(52, 211, 153, 0.8) !important;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4) !important;
        }

        /* ── Button Glow Hover ── */
        .ag-button {
            overflow: hidden;
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #10b981, #059669) !important;
            border: 1px solid rgba(16, 185, 129, 0.5) !important;
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4) !important;
        }
        .ag-button:hover {
            box-shadow: 0 15px 35px rgba(16, 185, 129, 0.6) !important;
            transform: translateY(-2px) !important;
        }

    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="max-w-4xl w-full glass-card shadow-2xl overflow-hidden animate-render">
        <div class="bg-red-600 p-6 text-center text-white">
            <h1 class="text-3xl font-bold uppercase tracking-widest">Request Accepted</h1>
            <p class="opacity-90">Thank you for your heroic decision!</p>
        </div>

        <div class="p-8 grid md:grid-cols-2 gap-8">
            
            <div class="space-y-4 border-r border-gray-200 pr-4">
                <h2 class="text-xl font-bold text-gray-800 border-b pb-2">
                    <i class="fas fa-user-injured text-red-500 mr-2"></i>Patient Details
                </h2>
                <div>
                    <p class="text-sm text-gray-500 uppercase">Name</p>
                    <p id="patientName" class="text-lg font-semibold text-gray-900">Loading...</p>
                </div>
                <div>
                    <p class="text-sm text-gray-500 uppercase">Contact Number</p>
                    <a id="patientPhoneLink" href="#" class="text-xl font-bold text-red-600 hover:underline">
                        <i class="fas fa-phone-alt mr-2"></i><span id="patientPhone">...</span>
                    </a>
                </div>
            </div>

            <div class="space-y-4">
                <h2 class="text-xl font-bold text-gray-800 border-b pb-2">
                    <i class="fas fa-hand-holding-heart text-green-500 mr-2"></i>Donor Details
                </h2>
                <div>
                    <p class="text-sm text-gray-500 uppercase">Your Registered Name</p>
                    <p id="donorNameDisplay" class="text-lg font-semibold text-gray-900">Loading...</p>
                </div>
                <div>
                    <p class="text-sm text-gray-500 uppercase">Your Mobile</p>
                    <p id="donorPhoneDisplay" class="text-lg font-semibold text-gray-700">...</p>
                </div>
            </div>

        </div>

        <div class="p-8 bg-gray-50 text-center space-y-4">
            <p class="text-gray-600">The patient has been notified that you are coming.</p>
            <div class="flex flex-col md:flex-row gap-4 justify-center">
                <a id="googleMapsBtn" target="_blank" 
                   class="bg-green-600 hover:bg-green-700 text-white px-8 py-4 rounded-full font-bold shadow-lg transition transform hover:scale-105 flex items-center justify-center">
                    <i class="fas fa-directions mr-2 text-xl"></i> START NAVIGATION
                </a>
                <a href="index.html" class="text-gray-500 hover:text-gray-800 flex items-center justify-center">
                    Return to Home
                </a>
            </div>
        </div>
    </div>

    <script>
        // 1. Get data from the URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        
        const reqName = urlParams.get('reqName');
        const reqMobile = urlParams.get('reqMobile');
        const reqLat = urlParams.get('reqLat');
        const reqLng = urlParams.get('reqLng');
        const donorName = urlParams.get('donorName');
        const donorMobile = urlParams.get('donorMobile');

        // 2. Display the Patient Data
        if (reqName) document.getElementById('patientName').innerText = reqName;
        if (reqMobile) {
            document.getElementById('patientPhone').innerText = reqMobile;
            document.getElementById('patientPhoneLink').href = `tel:${reqMobile}`;
        }

        // 3. Display the Donor Data
        if (donorName) document.getElementById('donorNameDisplay').innerText = donorName;
        if (donorMobile) document.getElementById('donorPhoneDisplay').innerText = donorMobile;

        // 4. Setup Google Maps Navigation
        if (reqLat && reqLng) {
            const mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${reqLat},${reqLng}&travelmode=driving`;
            document.getElementById('googleMapsBtn').href = mapsUrl;
        }
    </script>


    <!-- GSAP for Smooth Entrance -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <!-- Particles.js -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <!-- Vanilla Tilt -->
    
    
    <script>
        // Initialize Particles
        if(document.getElementById('particles-js')) {
            particlesJS("particles-js", {
                "particles": {
                    "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
                    "color": { "value": "#10b981" },
                    "shape": { "type": "circle" },
                    "opacity": { "value": 0.4, "random": true },
                    "size": { "value": 3, "random": true },
                    "line_linked": { "enable": true, "distance": 150, "color": "#10b981", "opacity": 0.25, "width": 1 },
                    "move": { "enable": true, "speed": 1.5, "direction": "none", "random": true, "out_mode": "out" }
                },
                "interactivity": {
                    "detect_on": "canvas",
                    "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": true, "mode": "push" }, "resize": true },
                    "modes": { "grab": { "distance": 160, "line_linked": { "opacity": 0.5 } }, "push": { "particles_nb": 3 } }
                },
                "retina_detect": true
            });
        }

        // Initialize GSAP Animations
        document.addEventListener("DOMContentLoaded", () => {
            // gsap removed for visibility
            // gsap removed for visibility
            
            const inputs = document.querySelectorAll('.glass-input, .ag-button, .feature-badge, .nav-links a');
            if(inputs.length > 0) {
                // gsap removed for visibility
            }
        });
    </script>

</body>
</html>
