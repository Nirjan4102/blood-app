<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donor Registration | LIFESAVE Emergency Network</title>
    <meta name="description" content="Register as a blood donor with LIFESAVE. Get instant alerts when someone near you needs your blood group. 15km radius, 100% private.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        emerald: {
                            400: '#34d399',
                            500: '#10b981',
                            600: '#059669',
                            900: '#064e3b',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        *, *::before, *::after { box-sizing: border-box; }

        html {
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
            background-color: #050505;
            font-family: 'Outfit', sans-serif;
            color: #ffffff;
        }

        /* ── Background Layers ── */
        .bg-layer {
            position: fixed;
            inset: -20px;
            z-index: 0;
            background: url('blood.jpg') center / cover no-repeat;
            filter: blur(10px) brightness(0.45);
            pointer-events: none;
        }

        .bg-overlay {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: linear-gradient(
                160deg,
                rgba(5, 2, 8, 0.96) 0%,
                rgba(30, 5, 12, 0.90) 40%,
                rgba(100, 0, 18, 0.75) 100%
            );
            pointer-events: none;
        }

        /* ── Z-Index ── */
        nav.site-nav   { z-index: 100; }
        .main-content   { z-index: 10; position: relative; }

        /* ── Navigation ── */
        nav.site-nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            background: rgba(5, 5, 10, 0.55);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        /* ── Glass Card ── */
        .glass-card {
            background: rgba(20, 18, 28, 0.55);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-top-color: rgba(255, 255, 255, 0.22);
            border-left-color: rgba(255, 255, 255, 0.16);
            box-shadow:
                0 24px 60px rgba(0, 0, 0, 0.45),
                0 0 40px rgba(5, 150, 105, 0.12),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
            border-radius: 2rem;
            transition: box-shadow 0.5s ease, transform 0.5s ease;
        }

        .glass-card:hover {
            box-shadow:
                0 28px 70px rgba(0, 0, 0, 0.5),
                0 0 55px rgba(5, 150, 105, 0.22),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            transform: translateY(-6px);
        }

        /* ── Float Animation ── */
        .float-wrapper {
            animation: float 7s ease-in-out infinite;
            will-change: transform;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-10px); }
        }
        .float-wrapper:hover { animation-play-state: paused; }

        /* ── Glass Inputs ── */
        .glass-input {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 1rem;
            color: #fff;
            font-size: 1rem;
            padding: 1rem 1.25rem;
            width: 100%;
            outline: none;
            transition: border-color 0.35s, box-shadow 0.35s, background 0.35s;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.02);
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(16, 185, 129, 0.55);
            box-shadow: 0 0 22px rgba(16, 185, 129, 0.25);
        }
        .glass-input::placeholder { color: rgba(255,255,255,0.28); }
        select.glass-input { cursor: pointer; appearance: none; }
        select.glass-input option { background: #141220; color: #fff; }

        /* Date input color fix */
        input[type="date"].glass-input::-webkit-calendar-picker-indicator {
            filter: invert(1) brightness(0.7);
            cursor: pointer;
        }

        /* ── Labels ── */
        .field-label {
            display: block;
            font-size: 0.65rem;
            font-weight: 900;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #34d399;
            margin-bottom: 0.5rem;
            padding-left: 0.25rem;
        }

        .field-hint {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.35);
            margin-top: 0.35rem;
            padding-left: 0.25rem;
        }

        /* ── Typography ── */
        .premium-text {
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }
        .title-gradient {
            background: linear-gradient(to right, #ffffff, #a7f3d0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ── Submit Button ── */
        .ag-button {
            background: linear-gradient(135deg, #10b981, #047857);
            border: 1px solid rgba(110, 231, 183, 0.25);
            border-radius: 1rem;
            padding: 1.25rem;
            width: 100%;
            color: #fff;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 28px rgba(16, 185, 129, 0.35);
            transition: transform 0.35s ease, box-shadow 0.35s ease;
        }
        .ag-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 40px rgba(16, 185, 129, 0.55);
        }
        .ag-button:active { transform: translateY(1px); }
        .ag-button::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.12) 50%, transparent 70%);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }
        .ag-button:hover::after { transform: translateX(100%); }
        .ag-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ── Feature Badges ── */
        .feature-badge {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            text-align: center;
            transition: all 0.4s ease;
        }
        .feature-badge:hover {
            background: rgba(16, 185, 129, 0.08);
            border-color: rgba(16, 185, 129, 0.25);
            transform: translateY(-4px);
        }
        .feature-badge i {
            font-size: 1.25rem;
            display: block;
            margin-bottom: 0.4rem;
        }
        .feature-badge span {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(16, 185, 129,0.4); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(16, 185, 129,0.7); }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            nav.site-nav { padding: 0.75rem 1rem; }
            .glass-card  { border-radius: 1.25rem; }
            .ag-button   { font-size: 0.95rem; padding: 1rem; }
            .nav-links   { gap: 0.75rem; }
            .nav-links a { font-size: 0.7rem; }
        }
    
        /* ── Particles BG ── */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #050505 0%, #064e3b 100%);
            z-index: 0;
            top: 0; left: 0;
        }

        /* ── Refined Glassmorphism ── */
        .glass-card {
            background: rgba(30, 41, 59, 0.7) !important; /* Lighter slate-blue/green glass */
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            border-top: 1px solid rgba(255, 255, 255, 0.3) !important;
            border-left: 1px solid rgba(255, 255, 255, 0.3) !important;
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.5), 
                0 0 40px rgba(16, 185, 129, 0.1) !important;
            animation: none !important;
        }

        .float-wrapper {
            animation: none !important;
        }

        /* ── Input Polish ── */
        .glass-input {
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.1) !important; /* Brighter input background */
            border: 1px solid rgba(255, 255, 255, 0.3) !important; /* Brighter border */
            color: #ffffff !important;
        }
        .glass-input::placeholder { color: rgba(255, 255, 255, 0.6) !important; }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.15) !important;
            border-color: rgba(52, 211, 153, 0.8) !important;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4) !important;
        }

        /* ── Button Glow Hover ── */
        .ag-button {
            overflow: hidden;
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #10b981, #059669) !important;
            border: 1px solid rgba(16, 185, 129, 0.5) !important;
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4) !important;
        }
        .ag-button:hover {
            box-shadow: 0 15px 35px rgba(16, 185, 129, 0.6) !important;
            transform: translateY(-2px) !important;
        }

    </style>
</head>
<body>

    <!-- BG Layers -->
    <div id="particles-js"></div>

    <!-- Navigation -->
    <nav class="site-nav">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-full flex items-center justify-center border border-emerald-500/50" style="background:rgba(16, 185, 129,0.12); box-shadow:0 0 14px rgba(16, 185, 129,0.3);">
                <i class="fa-solid fa-heart-pulse text-emerald-500 text-lg animate-pulse"></i>
            </div>
            <span class="text-white font-black text-xl premium-text">LIFESAVE</span>
        </div>
        <div class="nav-links flex gap-4 sm:gap-6">
            <a href="index.html" class="text-gray-400 font-medium pb-0.5 tracking-wider text-xs sm:text-sm hover:text-white transition-colors">Request Blood</a>
            <a href="register.html" class="text-white font-bold border-b-2 border-emerald-500 pb-0.5 tracking-wider text-xs sm:text-sm hover:text-emerald-400 transition-colors">Become a Donor</a>
            <a href="login.html" class="text-gray-400 font-medium pb-0.5 tracking-wider text-xs sm:text-sm hover:text-white transition-colors">Donor Login</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content flex flex-col items-center w-full px-4 sm:px-6 pt-24 sm:pt-28 pb-16">

        <!-- Floating Glass Registration Card -->
        <div class="float-wrapper w-full max-w-3xl">
            <div class="glass-card p-6 sm:p-10 md:p-12"   -glare >

                <!-- Header -->
                <div class="text-center mb-8 sm:mb-10">
                    <div class="inline-flex items-center justify-center w-16 h-16 sm:w-20 sm:h-20 rounded-full mb-5" style="background:rgba(16,185,129,0.08); border:1px solid rgba(16,185,129,0.25); box-shadow:0 0 30px rgba(16,185,129,0.15);">
                        <i class="fa-solid fa-hand-holding-droplet text-3xl sm:text-4xl text-green-400"></i>
                    </div>
                    <h1 class="text-3xl sm:text-4xl md:text-5xl font-black mb-3 title-gradient premium-text">Become a Donor</h1>
                    <p class="text-gray-400 text-base sm:text-lg font-light tracking-wide max-w-md mx-auto">Your details can save a life in your neighborhood. Join the anti-gravity network.</p>
                </div>

                <!-- Feature Badges -->
                <div class="grid grid-cols-3 gap-3 mb-8 sm:mb-10">
                    <div class="feature-badge">
                        <i class="fa-solid fa-bolt text-yellow-400"></i>
                        <span>Instant Alerts</span>
                    </div>
                    <div class="feature-badge">
                        <i class="fa-solid fa-location-crosshairs text-blue-400"></i>
                        <span>15km Radius</span>
                    </div>
                    <div class="feature-badge">
                        <i class="fa-solid fa-shield-heart text-emerald-400"></i>
                        <span>100% Private</span>
                    </div>
                </div>

                <!-- Registration Form -->
                <form id="donorForm" class="space-y-5">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">

                        <div>
                            <label class="field-label">Full Name</label>
                            <input type="text" name="name" required placeholder="Your full name" class="glass-input">
                        </div>

                        <div class="relative">
                            <label class="field-label">Blood Group</label>
                            <select name="bloodGroup" required class="glass-input font-bold pr-10">
                                <option value="" disabled selected>Select Group</option>
                                <option value="A+">A+</option><option value="A-">A-</option>
                                <option value="B+">B+</option><option value="B-">B-</option>
                                <option value="O+">O+</option><option value="O-">O-</option>
                                <option value="AB+">AB+</option><option value="AB-">AB-</option>
                            </select>
                            <i class="fa-solid fa-chevron-down text-emerald-500 text-xs absolute right-4 top-[2.6rem] pointer-events-none"></i>
                        </div>

                        <div>
                            <label class="field-label">Mobile Number</label>
                            <input type="tel" name="mobile" required placeholder="Your phone number" class="glass-input">
                        </div>

                        <div>
                            <label class="field-label">Email (Gmail)</label>
                            <input type="email" name="email" required placeholder="your.email@gmail.com" class="glass-input">
                        </div>

                        <div>
                            <label class="field-label">Village / Block</label>
                            <input type="text" name="village" required placeholder="Your locality" class="glass-input">
                        </div>

                        <div>
                            <label class="field-label">Post Office</label>
                            <input type="text" name="post" required placeholder="Nearest post office" class="glass-input">
                        </div>

                        <div>
                            <label class="field-label">District</label>
                            <input type="text" name="district" required placeholder="District name" class="glass-input">
                        </div>

                        <div>
                            <label class="field-label">State</label>
                            <input type="text" name="state" required value="West Bengal" class="glass-input">
                        </div>

                        <div class="sm:col-span-2">
                            <label class="field-label">Last Donation Date</label>
                            <input type="date" name="lastDonationDate" class="glass-input">
                            <p class="field-hint"><i class="fa-solid fa-circle-info mr-1"></i>Leave blank if you have never donated.</p>
                        </div>
                    </div>

                    <div class="pt-4">
                        <button type="submit" id="submitBtn" class="ag-button">
                            <span class="premium-text">Register as Donor</span>
                            <i class="fa-solid fa-user-plus"></i>
                        </button>
                    </div>
                </form>

                <!-- Status Message -->
                <div id="message" class="mt-6 hidden">
                    <div class="p-4 rounded-xl text-center font-bold text-sm tracking-wide" style="position:relative; z-index:20;">
                        <p class="font-medium"></p>
                    </div>
                </div>

            </div>
        </div>

    </main>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- App Scripts -->
    <script src="js/config.js?v=2"></script>
    <script src="js/supabase-client.js?v=2"></script>
    <script src="js/geocoder.js?v=2"></script>
    <script src="js/register-app.js?v=2"></script>

    <!-- GSAP for Smooth Entrance -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <!-- Particles.js -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <!-- Vanilla Tilt -->
    
    
    <script>
        // Initialize Particles
        if(document.getElementById('particles-js')) {
            particlesJS("particles-js", {
                "particles": {
                    "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
                    "color": { "value": "#10b981" },
                    "shape": { "type": "circle" },
                    "opacity": { "value": 0.4, "random": true },
                    "size": { "value": 3, "random": true },
                    "line_linked": { "enable": true, "distance": 150, "color": "#10b981", "opacity": 0.25, "width": 1 },
                    "move": { "enable": true, "speed": 1.5, "direction": "none", "random": true, "out_mode": "out" }
                },
                "interactivity": {
                    "detect_on": "canvas",
                    "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": true, "mode": "push" }, "resize": true },
                    "modes": { "grab": { "distance": 160, "line_linked": { "opacity": 0.5 } }, "push": { "particles_nb": 3 } }
                },
                "retina_detect": true
            });
        }

        // Initialize GSAP Animations
        document.addEventListener("DOMContentLoaded", () => {
            // gsap removed for visibility
            // gsap removed for visibility
            
            const inputs = document.querySelectorAll('.glass-input, .ag-button, .feature-badge, .nav-links a');
            if(inputs.length > 0) {
                // gsap removed for visibility
            }
        });
    </script>

</body>
</html>
