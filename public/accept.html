<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accepting Request | LIFESAVE</title>
    <meta name="description" content="Donor acceptance page for LIFESAVE Emergency Blood Network.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        emerald: { 400: '#34d399', 500: '#10b981', 600: '#059669', 900: '#064e3b' }
                    }
                }
            }
        }
    </script>

    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; min-height: 100vh;
            background-color: #050505;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .bg-layer {
            position: fixed; inset: -20px; z-index: 0;
            background: url('blood.jpg') center / cover no-repeat;
            filter: blur(10px) brightness(0.45);
            pointer-events: none;
        }
        .bg-overlay {
            position: fixed; inset: 0; z-index: 1;
            background: linear-gradient(160deg, rgba(5,2,8,0.96) 0%, rgba(30,5,12,0.90) 40%, rgba(100,0,18,0.75) 100%);
            pointer-events: none;
        }
        .glass-card {
            position: relative; z-index: 10;
            background: rgba(20, 18, 28, 0.55);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-top-color: rgba(255, 255, 255, 0.22);
            box-shadow: 0 24px 60px rgba(0,0,0,0.45), 0 0 40px rgba(5, 150, 105,0.12);
            border-radius: 2rem;
            padding: 3rem 2.5rem;
            text-align: center;
            max-width: 480px;
            width: 90%;
        }
        .spinner {
            width: 48px; height: 48px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #10b981;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .premium-text { letter-spacing: 0.15em; text-transform: uppercase; }
    
        /* ── Particles BG ── */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #050505 0%, #064e3b 100%);
            z-index: 0;
            top: 0; left: 0;
        }

        /* ── Refined Glassmorphism ── */
        .glass-card {
            background: rgba(30, 41, 59, 0.7) !important; /* Lighter slate-blue/green glass */
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            border-top: 1px solid rgba(255, 255, 255, 0.3) !important;
            border-left: 1px solid rgba(255, 255, 255, 0.3) !important;
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.5), 
                0 0 40px rgba(16, 185, 129, 0.1) !important;
            animation: none !important;
        }

        .float-wrapper {
            animation: none !important;
        }

        /* ── Input Polish ── */
        .glass-input {
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.1) !important; /* Brighter input background */
            border: 1px solid rgba(255, 255, 255, 0.3) !important; /* Brighter border */
            color: #ffffff !important;
        }
        .glass-input::placeholder { color: rgba(255, 255, 255, 0.6) !important; }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.15) !important;
            border-color: rgba(52, 211, 153, 0.8) !important;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4) !important;
        }

        /* ── Button Glow Hover ── */
        .ag-button {
            overflow: hidden;
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #10b981, #059669) !important;
            border: 1px solid rgba(16, 185, 129, 0.5) !important;
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4) !important;
        }
        .ag-button:hover {
            box-shadow: 0 15px 35px rgba(16, 185, 129, 0.6) !important;
            transform: translateY(-2px) !important;
        }

    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="glass-card"   -glare >
        <div class="spinner"></div>
        <h1 class="text-2xl font-black mb-2 premium-text">
            <i class="fa-solid fa-heart-pulse text-emerald-500 mr-2 animate-pulse"></i>LIFESAVE
        </h1>
        <p id="accept-status" class="text-gray-300 text-lg font-light mt-4">
            Connecting to network...
        </p>
    </div>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- App Scripts -->
    <script src="js/config.js?v=2"></script>
    <script src="js/supabase-client.js?v=2"></script>
    <script src="js/accept-app.js?v=2"></script>

    <!-- GSAP for Smooth Entrance -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <!-- Particles.js -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <!-- Vanilla Tilt -->
    
    
    <script>
        // Initialize Particles
        if(document.getElementById('particles-js')) {
            particlesJS("particles-js", {
                "particles": {
                    "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
                    "color": { "value": "#10b981" },
                    "shape": { "type": "circle" },
                    "opacity": { "value": 0.4, "random": true },
                    "size": { "value": 3, "random": true },
                    "line_linked": { "enable": true, "distance": 150, "color": "#10b981", "opacity": 0.25, "width": 1 },
                    "move": { "enable": true, "speed": 1.5, "direction": "none", "random": true, "out_mode": "out" }
                },
                "interactivity": {
                    "detect_on": "canvas",
                    "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": true, "mode": "push" }, "resize": true },
                    "modes": { "grab": { "distance": 160, "line_linked": { "opacity": 0.5 } }, "push": { "particles_nb": 3 } }
                },
                "retina_detect": true
            });
        }

        // Initialize GSAP Animations
        document.addEventListener("DOMContentLoaded", () => {
            // gsap removed for visibility
            // gsap removed for visibility
            
            const inputs = document.querySelectorAll('.glass-input, .ag-button, .feature-badge, .nav-links a');
            if(inputs.length > 0) {
                // gsap removed for visibility
            }
        });
    </script>

</body>
</html>
